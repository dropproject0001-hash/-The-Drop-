<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- FIX M-7: Title updated from placeholder "My Google AI Studio App" -->
    <title>DropPin Ops — Mamburao Live Tracking</title>
    <meta name="description" content="DropPin Ops — Offline-ready field drop tracking for Mamburao, Occidental Mindoro." />
    <meta name="theme-color" content="#0A66C2" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js').catch((err) => {
            console.error('Service worker registration failed:', err);
          });
        });
      }
    </script>
  </body>
</html>
