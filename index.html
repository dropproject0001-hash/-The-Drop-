<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="icon" type="image/png" href="/logo.png" />
    <title>The Drop — Nueva Ecija Live Tracking</title>
    <meta name="description" content="The Drop (Droppin Ops) — Secure, covert, and offline-ready product drop tracking for Nueva Ecija field operations." />
    <meta name="theme-color" content="#22c55e" />
    <script>
      // Global error handler to catch and display any runtime JS crashes in the browser
      window.addEventListener('error', function(e) {
        showErrorHUD('Telemetry Error: ' + e.message, e.filename + ':' + e.lineno + ':' + e.colno, e.error?.stack);
      });
      window.addEventListener('unhandledrejection', function(e) {
        showErrorHUD('Unhandled Rejection: ' + e.reason?.message || e.reason, 'Promise rejection', e.reason?.stack);
      });

      function showErrorHUD(title, location, stack) {
        var hud = document.getElementById('debug-telemetry-hud');
        if (!hud) {
          hud = document.createElement('div');
          hud.id = 'debug-telemetry-hud';
          hud.style = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(5,5,5,0.95);color:#ef4444;font-family:monospace;padding:24px;z-index:999999;overflow-y:auto;border:3px solid #ef4444;box-sizing:border-box;font-size:12px;';
          
          var header = document.createElement('h1');
          header.style = 'font-weight:bold;font-size:18px;margin-bottom:8px;text-transform:uppercase;letter-spacing:0.1em;border-bottom:1px solid #ef4444;padding-bottom:8px;';
          header.innerText = '🔴 CRITICAL CLIENT TELEMETRY FAILURE';
          hud.appendChild(header);

          var explanation = document.createElement('p');
          explanation.style = 'margin-bottom:16px;color:#fca5a5;';
          explanation.innerText = 'The terminal application encountered an unhandled exception during browser boot or rendering structure.';
          hud.appendChild(explanation);

          var details = document.createElement('div');
          details.id = 'hud-details';
          details.style = 'background:rgba(0,0,0,0.8);border:1px solid rgba(239,68,68,0.3);padding:16px;border-radius:8px;margin-bottom:16px;';
          hud.appendChild(details);

          document.body.appendChild(hud);
        }
        var detailsDiv = document.getElementById('hud-details');
        if (detailsDiv) {
          detailsDiv.innerHTML = '<strong>ErrorMessage:</strong> <span style="color:#ffffff;">' + title + '</span><br>' +
                                 '<strong>SourceCoord:</strong> <span style="color:#ffffff;">' + location + '</span><br><br>' +
                                 '<strong>Stacktrace:</strong><br>' +
                                 '<pre style="white-space:pre-wrap;color:#fca5a5;margin-top:8px;font-size:11px;line-height:1.4;">' + (stack || 'No trace available') + '</pre>';
        }
      }
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      if ('serviceWorker' in navigator) {
        console.warn('⚠️ [PWA Protection] Purging all service workers and clearing caches to guarantee fresh load.');
        
        // 1. Unregister all service workers
        navigator.serviceWorker.getRegistrations().then(function(registrations) {
          for (var registration of registrations) {
            registration.unregister();
            console.log('✅ Action complete: Service worker unregistered.');
          }
        }).catch(function(err) {
          console.error('❌ Failed to unregister service worker:', err);
        });

        // 2. Clear all cache storages
        if (window.caches) {
          caches.keys().then(function(keys) {
            return Promise.all(keys.map(function(key) {
              console.log('✅ Action complete: Cache purged: ' + key);
              return caches.delete(key);
            }));
          }).catch(function(err) {
            console.error('❌ Failed to clear caches:', err);
          });
        }
      }
    </script>
  </body>
</html>
